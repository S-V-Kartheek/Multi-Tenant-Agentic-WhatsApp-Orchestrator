# ─────────────────────────────────────────────────────────────────────────────
# nginx.conf — Template file for Cloud Run compatibility
#
# ${PORT} is substituted at container startup via nginx's built-in
# envsubst template processing (files in /etc/nginx/templates/).
#
# Cloud Run sets PORT=8080 by default.
# Local docker-compose can set PORT=80 or leave at default 8080.
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen ${PORT};
    root /usr/share/nginx/html;
    index index.html;

    # Handle React Router (SPA — return index.html for all routes)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively (Vite hashes filenames)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";
}
