version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# Local development stack
# Run: docker-compose up --build
# ─────────────────────────────────────────────────────────────────────────────

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: whatsapp_agent_backend
    ports:
      - "8080:8080"
    env_file:
      - ./backend/.env
    volumes:
      # Hot-reload in dev mode — mount source directly
      - ./backend/app:/app/app
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8080
      --reload
      --log-level info
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - app_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: whatsapp_agent_frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://localhost:8080
    volumes:
      - ./frontend/src:/app/src
    networks:
      - app_network
    depends_on:
      - backend

networks:
  app_network:
    driver: bridge
